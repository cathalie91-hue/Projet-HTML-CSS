<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement mobile - Choisissez votre opérateur</title>
    <link rel="stylesheet" href="./files/mobilePay.css">
</head>
<body>

    <a href="./files/pay.html" class="back-home-text">
    ← Retour
    </a>

    <div class="payment-container">
        <h2 class="payment-title">Choisissez votre opérateur :</h2>
        
        <div class="operators-grid">
            <!-- Mvola -->
            <div class="operator-card" data-operator="mvola">
                <a href="https://testweb.mvola.mg" target="_blank" rel="noopener noreferrer" class="operator-link">
                    <div class="operator-logo">
                        <img src="./assets/Mvola.png" alt="Mvola">
                    </div>
                    <h3 class="operator-name">Mvola</h3>
                    <div class="operator-number">
                        <span>+261 34 28 309 27</span>
                    </div>
                    <div class="operator-action">
                        <span>Payer avec Mvola</span>
                        <i class="arrow-icon">→</i>
                    </div>
                </a>
            </div>

            <!-- Orange Money -->
            <div class="operator-card" data-operator="orange">
                <a href="http://123.orange.mg/Redirection" target="_blank" rel="noopener noreferrer" class="operator-link">
                    <div class="operator-logo">
                        <img src="./assets/OM.webp" alt="Orange Money">
                    </div>
                    <h3 class="operator-name">Orange Money</h3>
                    <div class="operator-number">
                        <span>+261 32 83 991 15</span>
                    </div>
                    <div class="operator-action">
                        <span>Payer avec Orange Money</span>
                        <i class="arrow-icon">→</i>
                    </div>
                </a>
            </div>

            <!-- Airtel Money -->
            <div class="operator-card" data-operator="airtel">
                <a href="https://www.airtel.mg" target="_blank" rel="noopener noreferrer" class="operator-link">
                    <div class="operator-logo">
                        <img src="./assets/airtel-logo-png_seeklogo-168290.png" alt="Airtel Money">
                    </div>
                    <h3 class="operator-name">Airtel Money</h3>
                    <div class="operator-number">
                        <span>+261 33 37 998 50</span>
                    </div>
                    <div class="operator-action">
                        <span>Payer avec Airtel Money</span>
                        <i class="arrow-icon">→</i>
                    </div>
                </a>
            </div>
        </div>

        <div class="info-message">
            <i class="info-icon">ℹ️</i>
            <p>Cliquez sur un opérateur pour être redirigé vers sa plateforme de paiement</p>
        </div>
    </div>
</body>
</html>
